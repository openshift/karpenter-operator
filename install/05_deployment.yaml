---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karpenter-operator
  namespace: openshift-karpenter
  labels:
    k8s-app: karpenter-operator
  annotations:
    exclude.release.openshift.io/internal-openshift-hosted: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: karpenter-operator
  template:
    metadata:
      annotations:
        target.workload.openshift.io/management: '{"effect": "PreferredDuringScheduling"}'
        kubectl.kubernetes.io/default-container: karpenter-operator
        openshift.io/required-scc: restricted-v2
      labels:
        k8s-app: karpenter-operator
    spec:
      priorityClassName: system-node-critical
      serviceAccountName: karpenter-operator
      containers:
      - name: karpenter-operator
        image: quay.io/openshift/origin-karpenter-operator:latest
        command:
        - karpenter-operator
        args:
        - --leader-elect
        - --namespace=$(NAMESPACE)
        env:
        - name: RELEASE_VERSION
          value: "0.0.1-snapshot"
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: KARPENTER_IMAGE
          value: quay.io/openshift/origin-karpenter:latest
        - name: CLUSTER_NAME
          value: ""
        - name: AWS_SHARED_CREDENTIALS_FILE
          value: /etc/provider/credentials
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
        volumeMounts:
        - name: provider-creds
          mountPath: /etc/provider
          readOnly: true
        terminationMessagePolicy: FallbackToLogsOnError
      volumes:
      - name: provider-creds
        secret:
          secretName: karpenter-operator-cloud-credentials
          optional: true
      securityContext:
        runAsNonRoot: true
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      restartPolicy: Always
      tolerations:
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
